<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Custom Wordle</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  </head>
  <body>
    <main class="page-container">
      <section class="card">
        <h1>Create a Custom Wordle</h1>

        <form id="create-form">
          <label for="length">Character Length</label>
          <input
            type="number"
            id="length"
            min="3"
            max="12"
            value="5"
            required
          />

          <label for="guesses">Guesses Allowed</label>
          <input
            type="number"
            id="guesses"
            min="3"
            max="9"
            value="6"
            required
          />

          <label for="word">Secret Word</label>
          <input type="text" id="word" maxlength="12" required />

          <button type="submit" class="main-button">Generate Link</button>
        </form>

        <div id="create-message" class="message"></div>

        <div id="link-output" class="link-output hidden">
          <p>Your game link:</p>
          <input type="text" id="generated-link" readonly />
          <button
            id="copy-link"
            class="main-button secondary-button"
            type="button"
          >
            Copy Link
          </button>
        </div>
        <div id="qr-container" class="qr-container"></div>

        <div class="top-link">
          <a href="index.html">Back to Home</a>
        </div>
      </section>
    </main>

    <script>
      const createForm = document.getElementById("create-form");
      const lengthInput = document.getElementById("length");
      const guessesInput = document.getElementById("guesses");
      const wordInput = document.getElementById("word");
      const createMessage = document.getElementById("create-message");
      const linkOutput = document.getElementById("link-output");
      const generatedLink = document.getElementById("generated-link");
      const copyLinkButton = document.getElementById("copy-link");
      const qrContainer = document.getElementById("qr-container");

      function encodeGameData(word, length, guesses) {
        const gameData = {
          word: word,
          length: length,
          guesses: guesses,
        };

        return btoa(JSON.stringify(gameData));
      }

      createForm.addEventListener("submit", function (event) {
        event.preventDefault();

        const length = parseInt(lengthInput.value);
        const guesses = parseInt(guessesInput.value);
        const word = wordInput.value.trim().toUpperCase();

        createMessage.textContent = "";
        linkOutput.classList.add("hidden");
        qrContainer.innerHTML = "";

        if (word.length !== length) {
          createMessage.textContent =
            "The word length must match the character length setting.";
          return;
        }

        if (!/^[A-Z]+$/.test(word)) {
          createMessage.textContent = "The word must contain letters only.";
          return;
        }

        const encodedData = encodeGameData(word, length, guesses);
        const link = `${window.location.origin}${window.location.pathname.replace("create.html", "game.html")}?data=${encodedData}`;

        generatedLink.value = link;
        linkOutput.classList.remove("hidden");

        // Generate QR code
        new QRCode(qrContainer, {
          text: link,
          width: 200,
          height: 200,
        });
      });

      copyLinkButton.addEventListener("click", function () {
        generatedLink.select();
        generatedLink.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(generatedLink.value);
        createMessage.textContent = "Link copied to clipboard.";
      });
    </script>
  </body>
</html>
